        }

        }

        .iframe-center {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            min-height: 100%;

            </head>
            <body>
                <script>
                    const now = new Date();
                    const currentMonth = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
                    
                    function initPickers() {
                        const picker1 = document.getElementById('monthPicker1');
                        const picker2 = document.getElementById('monthPicker2');
                        
                        if (picker1 && picker2) {
                            picker1.value = currentMonth;
                            picker2.value = currentMonth;
                            
                            picker1.addEventListener('change', function() {
                                picker2.value = this.value;
                            });
                            picker2.addEventListener('change', function() {
                                picker1.value = this.value;
                            });
                        }
                    }
                    
                    if (document.readyState === 'loading') {
                        document.addEventListener('DOMContentLoaded', initPickers);
                    } else {
                        initPickers();
                    }
                    
                    // ===== GLOBAL FUNCTIONS =====
                    function formatMoney(val) {
                        if (val === '' || val === undefined || val === null) return '';
                        let num = parseFloat(String(val).replace(/,/g, ''));
                        if (isNaN(num)) return '';
                        return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                    }
                    
                    function parseMoney(val) {
                        if (val === '' || val === undefined) return 0;
                        let num = parseFloat(String(val).replace(/,/g, ''));
                        return isNaN(num) ? 0 : num;
                    }
                    
                    function calculateGross(col) {
                        const section = document.getElementById('earningsSection' + col);
                        const inputs = section.querySelectorAll('.earning-input');
                        let total = 0;
                        inputs.forEach(function(inp) {
                            total += parseMoney(inp.value);
                        });
                        const grossInput = document.getElementById('grossEarnings' + col);
                        if (grossInput) {
                            grossInput.value = formatMoney(total);
                            if (grossInput.value === '') grossInput.value = '0.00';
                        }
                        calculateNetPay(col);
                    }
                    
                    function calculateTotalDeduction(col) {
                        const section = document.getElementById('deductionSection' + col);
                        const inputs = section.querySelectorAll('.deduction-input');
                        let total = 0;
                        inputs.forEach(function(inp) {
                            total += parseMoney(inp.value);
                        });
                        const totalInput = document.getElementById('totalDeduction' + col);
                        if (totalInput) {
                            totalInput.value = formatMoney(total);
                            if (totalInput.value === '') totalInput.value = '0.00';
                        }
                        calculateNetPay(col);
                    }
                    
                    function calculateNetPay(col) {
                        const grossInput = document.getElementById('grossEarnings' + col);
                        const totalDedInput = document.getElementById('totalDeduction' + col);
                        const netPayInput = document.getElementById('netPay' + col);
                        
                        if (grossInput && totalDedInput && netPayInput) {
                            const gross = parseMoney(grossInput.value);
                            const ded = parseMoney(totalDedInput.value);
                            const net = gross - ded;
                            netPayInput.value = formatMoney(net);
                            if (netPayInput.value === '') netPayInput.value = '0.00';
                        }
                    }
                    
                    function validateNumberInput(input) {
                        let val = input.value.replace(/[^0-9.]/g, '');
                        const parts = val.split('.');
                        if (parts.length > 2) {
                            val = parts[0] + '.' + parts.slice(1).join('');
                        }
                        input.value = val;
                    }
                    
                    function setupEarningInput(input) {
                        const col = input.getAttribute('data-col');
                        
                        input.addEventListener('keydown', function(e) {
                            if (e.key === 'e' || e.key === 'E' || e.key === ' ' || 
                                (e.key.length === 1 && !/[0-9.]/.test(e.key) && 
                                 e.key !== 'Backspace' && e.key !== 'Delete' && 
                                 e.key !== 'Tab' && e.key !== 'Escape' && 
                                 e.key !== 'Enter' && e.key !== 'Home' && 
                                 e.key !== 'End' && e.key !== 'ArrowLeft' && 
                                 e.key !== 'ArrowRight' && e.key !== 'ArrowUp' && e.key !== 'ArrowDown')) {
                                e.preventDefault();
                            }
                        });
                        
                        input.addEventListener('input', function() {
                            validateNumberInput(this);
                            const col = this.getAttribute('data-col');
                            calculateGross(col);
                            
                            const otherCol = col === '1' ? '2' : '1';
                            const otherSection = document.getElementById('earningsSection' + otherCol);
                            const otherInputs = otherSection.querySelectorAll('.earning-input');
                            const thisInputs = document.getElementById('earningsSection' + col).querySelectorAll('.earning-input');
                            const idx = Array.from(thisInputs).indexOf(this);
                            if (otherInputs[idx]) {
                                otherInputs[idx].value = this.value;
                                calculateGross(otherCol);
                            }
                        });
                        
                        input.addEventListener('blur', function() {
                            if (this.value !== '' && this.value !== '.' && this.value !== '-') {
                                const formatted = formatMoney(this.value);
                                if (formatted !== '') {
                                    this.value = formatted;
                                } else {
                                    this.value = '';
                                }
                            } else {
                                this.value = '';
                            }
                            const col = this.getAttribute('data-col');
                            calculateGross(col);
                            
                            const otherCol = col === '1' ? '2' : '1';
                            const otherSection = document.getElementById('earningsSection' + otherCol);
                            const otherInputs = otherSection.querySelectorAll('.earning-input');
                            const thisInputs = document.getElementById('earningsSection' + col).querySelectorAll('.earning-input');
                            const idx = Array.from(thisInputs).indexOf(this);
                            if (otherInputs[idx]) {
                                otherInputs[idx].value = this.value;
                                calculateGross(otherCol);
                            }
                        });
                    }
                    
                    function setupDeductionInput(input) {
                        const col = input.getAttribute('data-col');
                        
                        input.addEventListener('keydown', function(e) {
                            if (e.key === 'e' || e.key === 'E' || e.key === ' ' || 
                                (e.key.length === 1 && !/[0-9.]/.test(e.key) && 
                                 e.key !== 'Backspace' && e.key !== 'Delete' && 
                                 e.key !== 'Tab' && e.key !== 'Escape' && 
                                 e.key !== 'Enter' && e.key !== 'Home' && 
                                 e.key !== 'End' && e.key !== 'ArrowLeft' && 
                                 e.key !== 'ArrowRight' && e.key !== 'ArrowUp' && e.key !== 'ArrowDown')) {
                                e.preventDefault();
                            }
                        });
                        
                        input.addEventListener('input', function() {
                            validateNumberInput(this);
                            const col = this.getAttribute('data-col');
                            calculateTotalDeduction(col);
                            
                            const otherCol = col === '1' ? '2' : '1';
                            const otherSection = document.getElementById('deductionSection' + otherCol);
                            const otherInputs = otherSection.querySelectorAll('.deduction-input');
                            const thisInputs = document.getElementById('deductionSection' + col).querySelectorAll('.deduction-input');
                            const idx = Array.from(thisInputs).indexOf(this);
                            if (otherInputs[idx]) {
                                otherInputs[idx].value = this.value;
                                calculateTotalDeduction(otherCol);
                            }
                        });
                        
                        input.addEventListener('blur', function() {
                            if (this.value !== '' && this.value !== '.' && this.value !== '-') {
                                const formatted = formatMoney(this.value);
                                if (formatted !== '') {
                                    this.value = formatted;
                                } else {
                                    this.value = '';
                                }
                            } else {
                                this.value = '';
                            }
                            const col = this.getAttribute('data-col');
                            calculateTotalDeduction(col);
                            
                            const otherCol = col === '1' ? '2' : '1';
                            const otherSection = document.getElementById('deductionSection' + otherCol);
                            const otherInputs = otherSection.querySelectorAll('.deduction-input');
                            const thisInputs = document.getElementById('deductionSection' + col).querySelectorAll('.deduction-input');
                            const idx = Array.from(thisInputs).indexOf(this);
                            if (otherInputs[idx]) {
                                otherInputs[idx].value = this.value;
                                calculateTotalDeduction(otherCol);
                            }
                        });
                    }
                    
                    function setupDeductionLabelInput(input, col) {
                        input.addEventListener('input', function () {
                            const otherCol = col === '1' ? '2' : '1';
                            const thisInputs = document
                                .getElementById('deductionSection' + col)
                                .querySelectorAll('.label-input');
                            const otherInputs = document
                                .getElementById('deductionSection' + otherCol)
                                .querySelectorAll('.label-input');
                            const idx = Array.from(thisInputs).indexOf(this);
                            if (idx > -1 && otherInputs[idx]) {
                                otherInputs[idx].value = this.value;
                            }
                        });
                    }
                    
                    function setupEarningLabelInput(input, col) {
                        input.addEventListener('input', function () {
                            const otherCol = col === '1' ? '2' : '1';
                            const thisInputs = document
                                .getElementById('earningsSection' + col)
                                .querySelectorAll('.label-input');
                            const otherInputs = document
                                .getElementById('earningsSection' + otherCol)
                                .querySelectorAll('.label-input');
                            const idx = Array.from(thisInputs).indexOf(this);
                            if (idx > -1 && otherInputs[idx]) {
                                otherInputs[idx].value = this.value;
                            }
                        });
                    }
                    
                    function getEarningRowIndex(rowElement) {
                        const section = rowElement.parentElement;
                        const rows = section.querySelectorAll('.earnings-row:not(#grossRow' + section.id.replace('earningsSection', '') + ')');
                        for (let i = 0; i < rows.length; i++) {
                            if (rows[i] === rowElement) return i;
                        }
                        return -1;
                    }
                    
                    function getDeductionRowIndex(rowElement) {
                        const section = rowElement.parentElement;
                        const rows = section.querySelectorAll('.deduction-row');
                        for (let i = 0; i < rows.length; i++) {
                            if (rows[i] === rowElement) return i;
                        }
                        return -1;
                    }
                    
                    function addEarningRow(col) {
                        col = String(col);
                        const section = document.getElementById('earningsSection' + col);
                        const grossRow = document.getElementById('grossRow' + col);
                        
                        const newRow = document.createElement('div');
                        newRow.className = 'earnings-row';
                        newRow.style.paddingLeft = '20px';
                        newRow.style.position = 'relative';
                        
                        const removeBtn = document.createElement('button');
                        removeBtn.className = 'remove-btn';
                        removeBtn.textContent = '×';
                        removeBtn.title = 'Remove row';
                        removeBtn.onclick = function() {
                            const idx = getEarningRowIndex(newRow);
                            newRow.remove();
                            calculateGross(col);
                            const otherCol = col === '1' ? '2' : '1';
                            const otherSection = document.getElementById('earningsSection' + otherCol);
                            const otherRows = otherSection.querySelectorAll('.earnings-row:not(#grossRow' + otherCol + ')');
                            if (otherRows[idx]) {
                                otherRows[idx].remove();
                                calculateGross(otherCol);
                            }
                        };
                        
                        const labelInput = document.createElement('input');
                        labelInput.type = 'text';
                        labelInput.className = 'label-input';
                        labelInput.placeholder = 'Description';
                        labelInput.value = '';
                        
                        const input = document.createElement('input');
                        input.type = 'text';
                        input.className = 'earning-input';
                        input.setAttribute('data-col', col);
                        input.setAttribute('inputmode', 'decimal');
                        input.placeholder = '0.00';
                        
                        newRow.appendChild(removeBtn);
                        newRow.appendChild(labelInput);
                        newRow.appendChild(input);
                        
                        section.insertBefore(newRow, grossRow);
                        setupEarningInput(input);
                        setupEarningLabelInput(labelInput, col);
                        
                        const otherCol = col === '1' ? '2' : '1';
                        const otherSection = document.getElementById('earningsSection' + otherCol);
                        const otherGrossRow = document.getElementById('grossRow' + otherCol);
                        
                        const otherNewRow = document.createElement('div');
                        otherNewRow.className = 'earnings-row';
                        otherNewRow.style.paddingLeft = '20px';
                        otherNewRow.style.position = 'relative';
                        
                        const otherRemoveBtn = document.createElement('button');
                        otherRemoveBtn.className = 'remove-btn';
                        otherRemoveBtn.textContent = '×';
                        otherRemoveBtn.title = 'Remove row';
                        otherRemoveBtn.onclick = function() {
                            const idx = getEarningRowIndex(otherNewRow);
                            otherNewRow.remove();
                            calculateGross(otherCol);
                            const origSection = document.getElementById('earningsSection' + col);
                            const origRows = origSection.querySelectorAll('.earnings-row:not(#grossRow' + col + ')');
                            if (origRows[idx]) {
                                origRows[idx].remove();
                                calculateGross(col);
                            }
                        };
                        
                        const otherLabelInput = document.createElement('input');
                        otherLabelInput.type = 'text';
                        otherLabelInput.className = 'label-input';
                        otherLabelInput.placeholder = 'Description';
                        otherLabelInput.value = '';
                        
                        const otherInput = document.createElement('input');
                        otherInput.type = 'text';
                        otherInput.className = 'earning-input';
                        otherInput.setAttribute('data-col', otherCol);
                        otherInput.setAttribute('inputmode', 'decimal');
                        otherInput.placeholder = '0.00';
                        
                        otherNewRow.appendChild(otherRemoveBtn);
                        otherNewRow.appendChild(otherLabelInput);
                        otherNewRow.appendChild(otherInput);
                        
                        otherSection.insertBefore(otherNewRow, otherGrossRow);
                        setupEarningInput(otherInput);
                        setupEarningLabelInput(otherLabelInput, otherCol);
                        
                        input.addEventListener('input', function() {
                            otherInput.value = this.value;
                            calculateGross(col);
                            calculateGross(otherCol);
                        });
                        otherInput.addEventListener('input', function() {
                            input.value = this.value;
                            calculateGross(col);
                            calculateGross(otherCol);
                        });
                        
                        input.focus();
                    }
                    
                    function addDeductionRow(col) {
                        col = String(col);
                        const section = document.getElementById('deductionSection' + col);
                        
                        const newRow = document.createElement('div');
                        newRow.className = 'deduction-row';
                        newRow.style.paddingLeft = '20px';
                        newRow.style.position = 'relative';
                        
                        const removeBtn = document.createElement('button');
                        removeBtn.className = 'remove-btn';
                        removeBtn.textContent = '×';
                        removeBtn.title = 'Remove row';
                        removeBtn.onclick = function() {
                            const idx = getDeductionRowIndex(newRow);
                            newRow.remove();
                            calculateTotalDeduction(col);
                            const otherCol = col === '1' ? '2' : '1';
                            const otherSection = document.getElementById('deductionSection' + otherCol);
                            const otherRows = otherSection.querySelectorAll('.deduction-row');
                            if (otherRows[idx]) {
                                otherRows[idx].remove();
                                calculateTotalDeduction(otherCol);
                            }
                        };
                        
                        const labelInput = document.createElement('input');
                        labelInput.type = 'text';
                        labelInput.className = 'label-input';
                        labelInput.placeholder = 'Description';
                        labelInput.value = '';
                        
                        const input = document.createElement('input');
                        input.type = 'text';
                        input.className = 'deduction-input';
                        input.setAttribute('data-col', col);
                        input.setAttribute('inputmode', 'decimal');
                        input.placeholder = '0.00';
                        
                        newRow.appendChild(removeBtn);
                        newRow.appendChild(labelInput);
                        newRow.appendChild(input);
                        
                        section.appendChild(newRow);
                        setupDeductionInput(input);
                        setupDeductionLabelInput(labelInput, col);
                        
                        const otherCol = col === '1' ? '2' : '1';
                        const otherSection = document.getElementById('deductionSection' + otherCol);
                        
                        const otherNewRow = document.createElement('div');
                        otherNewRow.className = 'deduction-row';
                        otherNewRow.style.paddingLeft = '20px';
                        otherNewRow.style.position = 'relative';
                        
                        const otherRemoveBtn = document.createElement('button');
                        otherRemoveBtn.className = 'remove-btn';
                        otherRemoveBtn.textContent = '×';
                        otherRemoveBtn.title = 'Remove row';
                        otherRemoveBtn.onclick = function() {
                            const idx = getDeductionRowIndex(otherNewRow);
                            otherNewRow.remove();
                            calculateTotalDeduction(otherCol);
                            const origSection = document.getElementById('deductionSection' + col);
                            const origRows = origSection.querySelectorAll('.deduction-row');
                            if (origRows[idx]) {
                                origRows[idx].remove();
                                calculateTotalDeduction(col);
                            }
                        };
                        
                        const otherLabelInput = document.createElement('input');
                        otherLabelInput.type = 'text';
                        otherLabelInput.className = 'label-input';
                        otherLabelInput.placeholder = 'Description';
                        otherLabelInput.value = '';
                        
                        const otherInput = document.createElement('input');
                        otherInput.type = 'text';
                        otherInput.className = 'deduction-input';
                        otherInput.setAttribute('data-col', otherCol);
                        otherInput.setAttribute('inputmode', 'decimal');
                        otherInput.placeholder = '0.00';
                        
                        otherNewRow.appendChild(otherRemoveBtn);
                        otherNewRow.appendChild(otherLabelInput);
                        otherNewRow.appendChild(otherInput);
                        
                        otherSection.appendChild(otherNewRow);
                        setupDeductionInput(otherInput);
                        setupDeductionLabelInput(otherLabelInput, otherCol);
                        
                        input.addEventListener('input', function() {
                            otherInput.value = this.value;
                            calculateTotalDeduction(col);
                            calculateTotalDeduction(otherCol);
                        });
                        otherInput.addEventListener('input', function() {
                            input.value = this.value;
                            calculateTotalDeduction(col);
                            calculateTotalDeduction(otherCol);
                        });
                        
                        input.focus();
                    }
                    
                    // ===== SYNC PERSONNEL DATA =====
                    function syncPersonnel() {
                        const fields = ['id', 'name', 'position', 'division', 'unit'];
                        fields.forEach(function(field) {
                            const el1 = document.getElementById(field + '1');
                            const el2 = document.getElementById(field + '2');
                            if (el1 && el2) {
                                // Remove existing listeners by cloning
                                const newEl1 = el1.cloneNode(true);
                                const newEl2 = el2.cloneNode(true);
                                el1.parentNode.replaceChild(newEl1, el1);
                                el2.parentNode.replaceChild(newEl2, el2);
                                
                                newEl1.addEventListener('input', function() {
                                    newEl2.value = this.value;
                                });
                                newEl2.addEventListener('input', function() {
                                    newEl1.value = this.value;
                                });
                            }
                        });
                    }
                    
                    // ===== SETUP ALL INPUTS =====
                    function setupAllEarningInputs() {
                        const allInputs = document.querySelectorAll('.earning-input');
                        allInputs.forEach(function(input) {
                            setupEarningInput(input);
                        });
                    }
                    
                    function setupAllEarningLabels() {
                        document.querySelectorAll('.earnings-section .label-input').forEach(function(input) {
                            const section = input.closest('.earnings-section');
                            const col = section.id.replace('earningsSection', '');
                            setupEarningLabelInput(input, col);
                        });
                    }
                    
                    function setupAllDeductionInputs() {
                        const allInputs = document.querySelectorAll('.deduction-input');
                        allInputs.forEach(function(input) {
                            setupDeductionInput(input);
                        });
                    }
                    
                    function setupAllDeductionLabels() {
                        document.querySelectorAll('.deduction-section .label-input').forEach(function(input) {
                            const section = input.closest('.deduction-section');
                            const col = section.id.replace('deductionSection', '');
                            setupDeductionLabelInput(input, col);
                        });
                    }
                    
                    // ===== INITIALIZE =====
                    setupAllEarningInputs();
                    setupAllEarningLabels();
                    setupAllDeductionInputs();
                    setupAllDeductionLabels();
                    
                    // Link monthly basic salary inputs
                    function linkMonthlyBasic() {
                        const basic1 = document.querySelector('#basicRow1 .earning-input');
                        const basic2 = document.querySelector('#basicRow2 .earning-input');
                        
                        if (basic1 && basic2) {
                            const newBasic1 = basic1.cloneNode(true);
                            const newBasic2 = basic2.cloneNode(true);
                            basic1.parentNode.replaceChild(newBasic1, basic1);
                            basic2.parentNode.replaceChild(newBasic2, basic2);
                            
                            newBasic1.setAttribute('data-col', '1');
                            newBasic2.setAttribute('data-col', '2');
                            
                            setupEarningInput(newBasic1);
                            setupEarningInput(newBasic2);
                            
                            setTimeout(function() {
                                calculateGross('1');
                                calculateGross('2');
                            }, 50);
                        }
                    }
                    
                    // Link deduction default rows (Late and Tax)
                    function linkDeductionDefaults() {
                        const absent1 = document.querySelector('#absentRow1 .deduction-input');
                        const absent2 = document.querySelector('#absentRow2 .deduction-input');
                        const late1 = document.querySelector('#lateRow1 .deduction-input');
                        const late2 = document.querySelector('#lateRow2 .deduction-input');
                        const tax1 = document.querySelector('#taxRow1 .deduction-input');
                        const tax2 = document.querySelector('#taxRow2 .deduction-input');
                        
                        if (absent1 && absent2) {
                            const newAbsent1 = absent1.cloneNode(true);
                            const newAbsent2 = absent2.cloneNode(true);
                            absent1.parentNode.replaceChild(newAbsent1, absent1);
                            absent2.parentNode.replaceChild(newAbsent2, absent2);
                            newAbsent1.setAttribute('data-col', '1');
                            newAbsent2.setAttribute('data-col', '2');
                            setupDeductionInput(newAbsent1);
                            setupDeductionInput(newAbsent2);
                        }
                        
                        if (late1 && late2) {
                            const newLate1 = late1.cloneNode(true);
                            const newLate2 = late2.cloneNode(true);
                            late1.parentNode.replaceChild(newLate1, late1);
                            late2.parentNode.replaceChild(newLate2, late2);
                            newLate1.setAttribute('data-col', '1');
                            newLate2.setAttribute('data-col', '2');
                            setupDeductionInput(newLate1);
                            setupDeductionInput(newLate2);
                        }
                        
                        if (tax1 && tax2) {
                            const newTax1 = tax1.cloneNode(true);
                            const newTax2 = tax2.cloneNode(true);
                            tax1.parentNode.replaceChild(newTax1, tax1);
                            tax2.parentNode.replaceChild(newTax2, tax2);
                            newTax1.setAttribute('data-col', '1');
                            newTax2.setAttribute('data-col', '2');
                            setupDeductionInput(newTax1);
                            setupDeductionInput(newTax2);
                        }
                        
                        setTimeout(function() {
                            calculateTotalDeduction('1');
                            calculateTotalDeduction('2');
                        }, 50);
                    }
                    
                    setTimeout(function() {
                        linkMonthlyBasic();
                        linkDeductionDefaults();
                        syncPersonnel();
                    }, 50);
                    
                    setTimeout(function() {
                        calculateGross('1');
                        calculateGross('2');
                        calculateTotalDeduction('1');
                        calculateTotalDeduction('2');
                    }, 100);

                    // ===== SIGNATURE SWITCHER =====
                    var signatureData = [
                        {
                            name: 'ENGR. JOSE ALBERT A. BARROGO',
                            position: 'Regional Executive Director'
                        },
                        {
                            name: 'RUBY GLIZ C. BARBOSA, CPA',
                            position: 'OIC-Chief, Administrative and Finance Division'
                        },
                        {
                            name: 'ANGELINE S. RASAY',
                            position: 'Administrative Officer III<br>AFD - HRMS'
                        }
                    ];

                    function updateSignature(col, index) {
                        var data = signatureData[index];
                        var nameEl = document.getElementById('certifiedName' + col);
                        var posEl = document.getElementById('certifiedPosition' + col);
                        var idxEl = document.getElementById('sigIndex' + col);

                        if (nameEl && posEl && idxEl) {
                            nameEl.textContent = data.name;
                            posEl.innerHTML = data.position;
                            idxEl.value = index;
                        }
                    }

                    function prevSignature(col) {
                        var idxEl = document.getElementById('sigIndex' + col);
                        if (idxEl) {
                            var current = parseInt(idxEl.value) || 0;
                            var prev = (current - 1 + signatureData.length) % signatureData.length;
                            // Update both columns
                            updateSignature('1', prev);
                            updateSignature('2', prev);
                        }
                    }

                    function nextSignature(col) {
                        var idxEl = document.getElementById('sigIndex' + col);

    <script>
        const iframe = document.getElementById('payslipIframe');
        const mainContainer = document.getElementById('mainContainer');
        const iframeCenter = document.getElementById('iframeCenter');
        const zoomLabel = document.getElementById('zoomLevel');

        const MIN_ZOOM = 0.25;
        const MAX_ZOOM = 3;
        const PAGE_W_IN = 8.5;
        const PAGE_H_IN = 13;
        const CSS_DPI = 96;

        let currentZoom = 1;

        function clamp(z) {
            return Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, z));
        }

        function setZoom(z, opts) {
            opts = opts || {};
            currentZoom = clamp(z);

            // Apply transform
            iframe.style.transform = `scale(${currentZoom})`;
            iframe.style.transformOrigin = 'top center';

            // CRITICAL: Don't resize the wrapper - let the iframe scale naturally
            // The wrapper should stay at the original size
            iframeCenter.style.width = '';
            iframeCenter.style.height = '';
            iframeCenter.style.display = 'flex';
            iframeCenter.style.justifyContent = 'center';
            iframeCenter.style.alignItems = 'flex-start';

            zoomLabel.textContent = Math.round(currentZoom * 100) + '%';

            if (!opts.preserveScroll) {
                mainContainer.scrollTop = 0;
                mainContainer.scrollLeft = 0;
                // Center after a small delay to allow layout to settle
                setTimeout(function () {
                    centerDocument();
                }, 10);
            }
        }

        function centerDocument() {
            // Center the iframe horizontally only; keep the top of the page in view
            const containerWidth = mainContainer.clientWidth;
            const pageWidth = PAGE_W_IN * CSS_DPI * currentZoom;

            const scrollX = Math.max(0, (pageWidth - containerWidth) / 2);

            mainContainer.scrollLeft = scrollX;
            mainContainer.scrollTop = 0;
        }

        function step(delta) {
            setZoom(currentZoom + delta);
        }

        function zoomIn() {
            if (currentZoom < 1.5) {
                currentZoom += 0.05;
                setZoom(currentZoom, { preserveScroll: false });
            }
        }

        function zoomOut() {
            if (currentZoom > 0.35) {
                currentZoom -= 0.05;
                setZoom(currentZoom, { preserveScroll: false });
            }
        }

        function resetZoom() {
            fitWidth();
        }

        function fitWidth() {
            const available = mainContainer.clientWidth - 40;
            const zoom = available / (PAGE_W_IN * CSS_DPI);
            setZoom(zoom, { preserveScroll: false });
        }

        function fitPage() {
            const availableW = mainContainer.clientWidth - 40;
            const availableH = mainContainer.clientHeight - 40;
            const scaleW = availableW / (PAGE_W_IN * CSS_DPI);
            const scaleH = availableH / (PAGE_H_IN * CSS_DPI);
            const zoom = Math.min(scaleW, scaleH);
            setZoom(zoom, { preserveScroll: false });
        }

        function printIframe() {
            const iframeWindow = iframe.contentWindow;
            iframeWindow.print();
        }

        // Set default zoom to 100%
        setZoom(1, { preserveScroll: false });

        iframe.addEventListener('load', function () {
            setTimeout(function () {
                centerDocument();
            }, 50);
        });

        document.addEventListener('keydown', function (e) {
            if (e.ctrlKey && (e.key === '=' || e.key === '+')) {
                e.preventDefault();
                zoomIn();
            } else if (e.ctrlKey && e.key === '-') {
                e.preventDefault();
                zoomOut();
            } else if (e.ctrlKey && e.key === '0') {
                e.preventDefault();
                resetZoom();
            }
        });

        mainContainer.addEventListener('wheel', function (e) {
            if (!(e.ctrlKey || e.metaKey)) return;
            e.preventDefault();

            const delta = e.deltaY < 0 ? 0.08 : -0.08;
            const newZoom = clamp(currentZoom + delta);
            if (newZoom === currentZoom) return;

            currentZoom = newZoom;

            // Apply zoom without resizing wrapper
            iframe.style.transform = `scale(${currentZoom})`;
            iframe.style.transformOrigin = 'top center';
            zoomLabel.textContent = Math.round(currentZoom * 100) + '%';
            iframeCenter.style.display = 'flex';
            iframeCenter.style.justifyContent = 'center';
            iframeCenter.style.alignItems = 'flex-start';

            // Anchor zoom to top-center, same as the toolbar zoom buttons
            centerDocument();
        }, { passive: false });

        let isDragging = false;
        let dragStartX = 0, dragStartY = 0, scrollStartX = 0, scrollStartY = 0;

        mainContainer.addEventListener('mousedown', function (e) {
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            scrollStartX = mainContainer.scrollLeft;
            scrollStartY = mainContainer.scrollTop;
            mainContainer.classList.add('dragging');
        });

        window.addEventListener('mousemove', function (e) {
            if (!isDragging) return;
            mainContainer.scrollLeft = scrollStartX - (e.clientX - dragStartX);
            mainContainer.scrollTop = scrollStartY - (e.clientY - dragStartY);
        });

        window.addEventListener('mouseup', function () {
            isDragging = false;
            mainContainer.classList.remove('dragging');
        });

        mainContainer.addEventListener('dblclick', function () {
            resetZoom();
        });

        zoomLabel.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                zoomLabel.blur();
            }
        });
        zoomLabel.addEventListener('blur', function () {
            const parsed = parseFloat(zoomLabel.textContent.replace(/[^0-9.]/g, ''));
            if (!isNaN(parsed) && parsed > 0) {
                setZoom(parsed / 100, { preserveScroll: true });
            } else {
                setZoom(currentZoom, { preserveScroll: true });
            }
        });

        let pinchStartDist = null;
        let pinchStartZoom = 1;

        function touchDist(t1, t2) {
            return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
        }

        mainContainer.addEventListener('touchstart', function (e) {
            if (e.touches.length === 2) {
                pinchStartDist = touchDist(e.touches[0], e.touches[1]);
                pinchStartZoom = currentZoom;
            }
        }, { passive: true });

        mainContainer.addEventListener('touchmove', function (e) {
            if (e.touches.length === 2 && pinchStartDist) {
                e.preventDefault();
                const newDist = touchDist(e.touches[0], e.touches[1]);
                setZoom(pinchStartZoom * (newDist / pinchStartDist), { preserveScroll: true });
            }
        }, { passive: false });

        mainContainer.addEventListener('touchend', function (e) {
            if (e.touches.length < 2) pinchStartDist = null;
        });
    </script>
